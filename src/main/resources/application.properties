spring.application.name=Edifika-Microservice-Payment

# Servidor
server.port=${PORT:8084}

# DB Supabase
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-us-west-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres.uudchsabsgexzjxfadwf}
spring.datasource.password=${DATABASE_PASSWORD:s3IffDTG5yCkZs4d}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
